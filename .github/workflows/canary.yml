name: Canary Release

on:
  push:
    branches:
      - main
    paths:
      - 'packages/**'

jobs:
  canary:
    name: Publish Canary
    runs-on: ubuntu-latest
    # Only run if there are no changesets (i.e., not a version PR merge)
    if: github.event.head_commit.message != 'chore: version packages'
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.1.0

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Set canary version
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          for pkg in packages/*/; do
            if [ -f "$pkg/package.json" ]; then
              CURRENT=$(node -p "require('./$pkg/package.json').version")
              NEW="${CURRENT}-canary.${TIMESTAMP}.${SHORT_SHA}"
              cd "$pkg"
              npm version "$NEW" --no-git-tag-version
              cd -
            fi
          done

      - name: Publish canary packages
        run: |
          for pkg in packages/*/; do
            if [ -f "$pkg/package.json" ]; then
              PRIVATE=$(node -p "require('./$pkg/package.json').private || false")
              if [ "$PRIVATE" != "true" ]; then
                cd "$pkg"
                pnpm publish --tag canary --no-git-checks --access public || true
                cd -
              fi
            fi
          done
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
